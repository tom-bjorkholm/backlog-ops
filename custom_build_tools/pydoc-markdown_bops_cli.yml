# pydoc-markdown.yml
loaders:
  - type: python
    # Where to search for Python packages/modules
    search_path:
      - ./../backlogops_cli/src
    # Packages (directories with __init__.py) to document
    packages:
      - backlogops_cli

processors:
  - type: filter
    # Optional: skip private members, etc.
    expression: >
      all(
        not part.startswith('_') or part in ('__init__', '__call__')
        for part in name.split('.')
      ) and
      default()
    skip_empty_modules: true
    exclude_private: true
  - type: smart
  - type: crossref

renderer:
  type: markdown
  filename: ./doc/backlogops_cli.md
