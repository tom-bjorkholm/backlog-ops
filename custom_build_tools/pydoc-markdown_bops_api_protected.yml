# pydoc-markdown.yml
loaders:
  - type: python
    # Where to search for Python packages/modules
    search_path:
      - ./../backlogops/src
    # Packages (directories with __init__.py) to document
    packages:
      - backlogops

processors:
  - type: filter
    # Optional: skip private members, etc.
    skip_empty_modules: true
    exclude_private: false
  - type: smart
  - type: crossref

renderer:
  type: markdown
  filename: ./doc/backlogops_protected_api.md
